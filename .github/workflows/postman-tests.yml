name: Postman API Tests

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  postman-tests:
    name: Run Demo API Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Spring Boot application
        run: ./gradlew build -x test

      - name: Start Spring Boot application
        run: ./gradlew bootRun &

      - name: Wait for server to be ready
        run: |
          echo "Waiting for server to start..."
          for i in {1..30}; do
            if curl -s http://localhost:8081/actuator/health > /dev/null 2>&1; then
              echo "Server is up!"
              break
            fi
            echo "Attempt $i: Server not ready yet, waiting 2s..."
            sleep 2
          done

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install -g newman newman-reporter-htmlextra js-yaml

      - name: Build Newman collection from YAML files
        run: |
          node -e "
          const fs = require('fs');
          const yaml = require('js-yaml');
          const path = require('path');

          const collectionDir = 'postman/collections/Demo API';
          const files = fs.readdirSync(collectionDir).filter(f => f.endsWith('.yaml'));

          const items = files.map(file => {
            const doc = yaml.load(fs.readFileSync(path.join(collectionDir, file), 'utf8'));
            return {
              name: doc.name,
              request: {
                method: doc.method,
                header: [{ key: 'Content-Type', value: 'application/json' }],
                url: {
                  raw: 'http://' + doc.url,
                  protocol: 'http',
                  host: doc.url.split('/')[0].split(':'),
                  path: doc.url.split('/').slice(1)
                },
                body: doc.body ? {
                  mode: 'raw',
                  raw: doc.body.content,
                  options: { raw: { language: 'json' } }
                } : undefined
              },
              event: [{
                listen: 'test',
                script: {
                  type: 'text/javascript',
                  exec: ['pm.test(\"Status code is 200\", function () { pm.response.to.have.status(200); });']
                }
              }]
            };
          });

          const collection = {
            info: {
              name: 'Demo API',
              schema: 'https://schema.getpostman.com/json/collection/v2.1.0/collection.json'
            },
            item: items
          };

          fs.writeFileSync('postman-collection.json', JSON.stringify(collection, null, 2));
          console.log('Collection built with', items.length, 'requests');
          "

      - name: Run Postman Tests with Newman
        run: |
          newman run postman-collection.json \
            --reporters cli,htmlextra \
            --reporter-htmlextra-export newman-report.html \
            --timeout-request 10000

      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-test-report
          path: newman-report.html