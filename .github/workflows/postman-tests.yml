name: Postman API Tests

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  postman-tests:
    name: Run All Collection Tests (Postman CLI)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Spring Boot application
        run: ./gradlew build -x test

      - name: Start Spring Boot application
        run: ./gradlew bootRun &

      - name: Wait for server to be ready
        run: |
          echo "Waiting for server to start..."
          for i in {1..30}; do
            if curl -s http://localhost:8081/actuator/health > /dev/null 2>&1; then
              echo "Server is up!"
              break
            fi
            echo "Attempt $i: Server not ready yet, waiting 2s..."
            sleep 2
          done

      - name: Install Postman CLI
        run: |
          curl -o- "https://dl-cli.pstmn.io/install/linux64.sh" | sh

      - name: Postman CLI Login
        run: postman login --with-api-key ${{ secrets.POSTMAN_API_KEY }}

      - name: Run Collection - Demo API
        id: run_demo_api
        run: |
          postman collection run "8D837Ced4cc4C4AF118eCB2F" 2>&1 | tee demo_api_result.txt
          EXIT_CODE=${PIPESTATUS[0]}
          if [ $EXIT_CODE -eq 0 ]; then
            echo "result=success" >> $GITHUB_OUTPUT
          else
            echo "result=failure" >> $GITHUB_OUTPUT
          fi
          exit $EXIT_CODE
        continue-on-error: true

      - name: Run Collection - Demo2
        id: run_demo2
        run: |
          postman collection run "8D837Ced4cc4C4AF118eCB2F" 2>&1 | tee demo2_result.txt
          EXIT_CODE=${PIPESTATUS[0]}
          if [ $EXIT_CODE -eq 0 ]; then
            echo "result=success" >> $GITHUB_OUTPUT
          else
            echo "result=failure" >> $GITHUB_OUTPUT
          fi
          exit $EXIT_CODE
        continue-on-error: true

      - name: Print Test Results Summary
        run: |
          echo "========================================"
          echo "         TEST RESULTS SUMMARY"
          echo "========================================"
          echo ""

          echo "[ Demo API ]"
          if [ "${{ steps.run_demo_api.outputs.result }}" = "success" ]; then
            echo "  Result : SUCCESS"
          else
            echo "  Result : FAILURE"
          fi
          echo ""

          echo "[ Demo2 ]"
          if [ "${{ steps.run_demo2.outputs.result }}" = "success" ]; then
            echo "  Result : SUCCESS"
          else
            echo "  Result : FAILURE"
          fi
          echo ""
          echo "========================================"

          if [ "${{ steps.run_demo_api.outputs.result }}" != "success" ] || \
             [ "${{ steps.run_demo2.outputs.result }}" != "success" ]; then
            echo "One or more collections FAILED. Marking workflow as failed."
            exit 1
          else
            echo "All collections PASSED!"
          fi