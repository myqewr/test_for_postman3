openapi: 3.0.0
info:
  title: Demo API
  version: 1.0.0
servers:
  - url: http://192.168.113.151:8081
paths:
  /login:
    post:
      summary: 로그인하기
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                loginId:
                  type: string
                  example: admin
                password:
                  type: string
                  example: admin
              required:
                - loginId
                - password
      responses:
        '200':
          description: OK
  /me/info:
    post:
      summary: 내 정보 얻기
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                accessToken:
                  type: string
                  example: accessToken
              required:
                - accessToken
      responses:
        '200':
          description: OK
